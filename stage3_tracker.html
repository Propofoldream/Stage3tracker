<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ST3 Tracker">
<title>Stage 3 Anaesthetics — Competency Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #0F6E56; --teal-light: #E1F5EE; --teal-mid: #1D9E75;
  --blue: #185FA5; --blue-light: #E6F1FB;
  --amber: #854F0B; --amber-light: #FAEEDA;
  --slate: #3a3f4a; --slate-light: #f4f5f7;
  --border: #e5e7eb; --white: #ffffff;
  --text: #1a1d23; --text-muted: #6b7280; --text-faint: #9ca3af;
  --radius: 10px; --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #f0f2f5; color: var(--text); min-height: 100vh; padding-bottom: 3rem; }

.topbar { background: var(--slate); color: white; padding: 0.9rem 1rem 0.75rem; position: sticky; top: 0; z-index: 100; display: flex; flex-direction: column; gap: 0.6rem; }
.topbar-title { font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
.topbar-sub { font-size: 18px; font-weight: 400; color: white; line-height: 1; }
.progress-row { display: flex; align-items: center; gap: 10px; }
.prog-bar-outer { flex: 1; height: 5px; background: rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden; }
.prog-bar-inner { height: 100%; background: var(--teal-mid); border-radius: 10px; transition: width 0.35s ease; }
.prog-label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.85); white-space: nowrap; font-family: 'DM Mono', monospace; }

.stats-strip { background: var(--white); border-bottom: 1px solid var(--border); display: flex; padding: 0.6rem 1rem; }
.stat-item { flex: 1; text-align: center; padding: 0.3rem 0; }
.stat-item + .stat-item { border-left: 1px solid var(--border); }
.stat-val { font-size: 20px; font-weight: 500; color: var(--text); display: block; line-height: 1; font-family: 'DM Mono', monospace; }
.stat-lbl { font-size: 10px; color: var(--text-muted); display: block; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.04em; }

.tab-strip { display: flex; background: var(--white); border-bottom: 1px solid var(--border); }
.tab { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 10px 20px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab.active { color: var(--teal); border-bottom-color: var(--teal-mid); }

.filter-strip { padding: 0.65rem 1rem; display: flex; gap: 6px; overflow-x: auto; background: var(--white); border-bottom: 1px solid var(--border); -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.filter-strip::-webkit-scrollbar { display: none; }
.fbtn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
.fbtn.active { background: var(--slate); color: white; border-color: var(--slate); }

.io-strip { display: flex; gap: 8px; padding: 0.65rem 1rem; background: var(--slate-light); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.io-btn { font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; background: white; color: var(--text); }
.io-btn.export { color: var(--teal); border-color: var(--teal-mid); }
.io-btn.import-btn { color: var(--blue); border-color: var(--blue); }
.io-btn.reset-btn { color: #c0392b; border-color: #e74c3c; }
#file-input { display: none; }

.domains { padding: 0.75rem; display: flex; flex-direction: column; gap: 0.6rem; }
.domain-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
.domain-hdr { padding: 0.8rem 1rem; display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; -webkit-user-select: none; }
.domain-hdr:active { background: var(--slate-light); }
.domain-chevron { font-size: 10px; color: var(--text-faint); transition: transform 0.2s; flex-shrink: 0; }
.domain-chevron.open { transform: rotate(90deg); }
.domain-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.3; }
.domain-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.domain-count { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.domain-minibar { width: 48px; height: 3px; background: var(--border); border-radius: 3px; overflow: hidden; }
.domain-minifill { height: 100%; background: var(--teal-mid); border-radius: 3px; transition: width 0.3s; }
.domain-body { display: none; }
.domain-body.open { display: block; }
.cap-list { list-style: none; }

.cap-item { border-top: 1px solid var(--border); padding: 0.7rem 1rem; display: flex; align-items: flex-start; gap: 10px; }
.cap-item.done { background: #fafffe; }
.cap-left { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; padding-top: 1px; }
.cap-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); min-width: 22px; text-align: center; }

.cap-check, .proc-check {
  width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--border);
  background: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all 0.15s;
}
.cap-check.checked, .proc-check.checked { background: var(--teal-mid); border-color: var(--teal-mid); }
.cap-check.checked::after, .proc-check.checked::after {
  content: ''; width: 10px; height: 6px; border-left: 2px solid white; border-bottom: 2px solid white;
  transform: rotate(-45deg) translate(1px, -1px); display: block;
}
.proc-check { margin-top: 1px; }

.cap-body, .proc-body { flex: 1; min-width: 0; }
.cap-desc { font-size: 13px; line-height: 1.45; color: var(--text); margin-bottom: 6px; }
.proc-name { font-size: 13px; line-height: 1.4; color: var(--text); margin-bottom: 4px; }
.done .cap-desc, .done .proc-name { color: var(--text-muted); text-decoration: line-through; text-decoration-color: #c0c0c0; }
.cap-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.sup-badge { font-size: 10px; padding: 2px 7px; border-radius: 4px; font-weight: 500; line-height: 1.5; }
.sup-4  { background: var(--teal-light);  color: var(--teal);  }
.sup-3  { background: var(--blue-light);  color: var(--blue);  }
.sup-2b { background: var(--amber-light); color: var(--amber); }
.sup-2a { background: var(--amber-light); color: var(--amber); }
.sup-na { background: #f3f4f6; color: var(--text-muted); }

.wpba-toggle { display: flex; align-items: center; gap: 5px; cursor: pointer; opacity: 0.35; transition: opacity 0.15s; }
.wpba-toggle.available { opacity: 1; }
.wpba-box { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--border); background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
.wpba-box.checked { background: var(--blue); border-color: var(--blue); }
.wpba-box.checked::after { content: ''; width: 7px; height: 4px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translate(0.5px, -0.5px); display: block; }
.wpba-lbl { font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.wpba-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--blue-light); color: var(--blue); font-weight: 500; white-space: nowrap; }
.wpba-date { font-size: 10px; color: var(--text-faint); white-space: nowrap; font-family: 'DM Mono', monospace; }

.modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
.modal-backdrop.hidden { display: none; }
.modal-sheet { background: var(--white); border-radius: 16px 16px 0 0; padding: 1.25rem 1rem 2rem; width: 100%; max-width: 480px; }
.modal-title { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 1rem; line-height: 1.4; }
.wpba-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.wpba-type-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); background: white; color: var(--text); cursor: pointer; transition: all 0.15s; text-align: center; }
.wpba-type-btn:active { transform: scale(0.97); }
.wpba-type-btn.selected { border-color: var(--blue); background: var(--blue-light); color: var(--blue); }
.modal-date-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
.modal-date-lbl { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.modal-date-input { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px; border-radius: 7px; border: 1px solid var(--border); color: var(--text); background: white; }
.modal-actions { display: flex; gap: 8px; }
.modal-btn { flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 11px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
.modal-btn.confirm { background: var(--blue); color: white; }
.modal-btn.confirm:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
.modal-btn.cancel { background: var(--slate-light); color: var(--text-muted); }
.modal-btn.clear { background: #fef2f2; color: #c0392b; }

.proc-item { border-top: 1px solid var(--border); padding: 0.65rem 1rem; display: flex; align-items: flex-start; gap: 10px; }
.proc-item.done { background: #fafffe; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--slate); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; transition: transform 0.25s ease; pointer-events: none; white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">RCoA 2021 Curriculum · ST6–7</div>
  <div class="topbar-sub">Stage 3 Competency Tracker</div>
  <div class="progress-row">
    <div class="prog-bar-outer"><div class="prog-bar-inner" id="main-bar" style="width:0%"></div></div>
    <span class="prog-label" id="main-pct">0%</span>
  </div>
</div>

<div class="stats-strip">
  <div class="stat-item"><span class="stat-val" id="stat-signed">0</span><span class="stat-lbl">Signed off</span></div>
  <div class="stat-item"><span class="stat-val" id="stat-wpba">0</span><span class="stat-lbl">WPBA done</span></div>
  <div class="stat-item"><span class="stat-val" id="stat-remain">0</span><span class="stat-lbl">Remaining</span></div>
  <div class="stat-item"><span class="stat-val" id="stat-total">0</span><span class="stat-lbl">Total</span></div>
</div>

<div class="tab-strip">
  <button class="tab active" id="tab-caps"  onclick="setTab('caps')">Capabilities</button>
  <button class="tab"        id="tab-procs" onclick="setTab('procs')">Practical Procedures</button>
</div>

<div id="view-caps">
  <div class="filter-strip">
    <button class="fbtn active" onclick="setFilter('all',this)">All</button>
    <button class="fbtn" onclick="setFilter('pending',this)">Not signed off</button>
    <button class="fbtn" onclick="setFilter('signed',this)">Signed off</button>
    <button class="fbtn" onclick="setFilter('nowpba',this)">WPBA done, awaiting sign-off</button>
  </div>
  <div class="domains" id="domains-container"></div>
</div>

<div id="view-procs" style="display:none">
  <div class="domains" id="procs-container"></div>
</div>

<div class="io-strip">
  <button class="io-btn export" onclick="exportData()">&#8595; Export progress</button>
  <label class="io-btn import-btn" for="file-input">&#8593; Import progress</label>
  <input type="file" id="file-input" accept=".json" onchange="importData(event)">
  <button class="io-btn reset-btn" onclick="confirmReset()">Reset all</button>
</div>

<div class="modal-backdrop hidden" id="wpba-modal" onclick="handleBackdropClick(event)">
  <div class="modal-sheet">
    <div class="modal-title" id="modal-cap-name">Log WPBA</div>
    <div class="modal-sub">Select assessment type and confirm date</div>
    <div class="wpba-type-grid">
      <button class="wpba-type-btn" onclick="selectType('A-CEX')">A-CEX</button>
      <button class="wpba-type-btn" onclick="selectType('CBD')">CBD</button>
      <button class="wpba-type-btn" onclick="selectType('ALMAT')">ALMAT</button>
      <button class="wpba-type-btn" onclick="selectType('DOPS')">DOPS</button>
    </div>
    <div class="modal-date-row">
      <span class="modal-date-lbl">Date:</span>
      <input type="date" class="modal-date-input" id="modal-date">
    </div>
    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn clear" id="modal-clear-btn" onclick="clearWpba()" style="display:none">Clear</button>
      <button class="modal-btn confirm" id="modal-confirm-btn" onclick="confirmWpba()" disabled>Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

const PROCEDURES = [
  { id:"airway", name:"Airway management", procs:[

    {id:"cse",     name:"Combined spinal/epidural", s:"4"},
    {id:"pnb",     name:"Simple peripheral nerve block", s:"4"},

    {id:"ll",      name:"Ultrasound guided lower limb block (incl. femoral nerve block and fascia iliaca block)", s:"4"},

  ]},
];

// ── STATE ─────────────────────────────────────────────────────────────

const CAP_KEY  = "stage3_caps_v3";
const PROC_KEY = "stage3_procs_v1";

function loadJSON(key) { try { return JSON.parse(localStorage.getItem(key)) || {}; } catch(e) { return {}; } }
function saveJSON(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

let capState  = loadJSON(CAP_KEY);
let procState = loadJSON(PROC_KEY);
let currentTab    = "caps";
let currentFilter = "all";

// ── HELPERS ───────────────────────────────────────────────────────────

function capId(did, code) { return did + "__" + code; }

function supBadge(s) {
  if (s === "4")   return '<span class="sup-badge sup-4">Level 4 — independent</span>';
  if (s === "3")   return '<span class="sup-badge sup-3">Level 3 — on-call supervisor</span>';
  if (s === "2b")  return '<span class="sup-badge sup-2b">Level 2b — in-hospital supervisor</span>';
  if (s === "2a")  return '<span class="sup-badge sup-2a">Level 2a — supervisor present</span>';
  if (s === "ref") return '<span class="sup-badge sup-na">See procedures grid</span>';
  return '<span class="sup-badge sup-na">N/A</span>';
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ── TABS ──────────────────────────────────────────────────────────────

function setTab(tab) {
  currentTab = tab;
  document.getElementById("tab-caps").classList.toggle("active",  tab === "caps");
  document.getElementById("tab-procs").classList.toggle("active", tab === "procs");
  document.getElementById("view-caps").style.display  = tab === "caps"  ? "" : "none";
  document.getElementById("view-procs").style.display = tab === "procs" ? "" : "none";
  tab === "caps" ? updateCapStats() : updateProcStats();
}

// ── CAPABILITIES ──────────────────────────────────────────────────────

function updateCapStats() {
  let total = 0, signed = 0, wpba = 0;
  DOMAINS.forEach(d => d.caps.forEach(c => {
    total++;
    const st = capState[capId(d.id, c.c)] || {};
    if (st.signed) signed++;
    if (st.wpba)   wpba++;
  }));
  document.getElementById("stat-total").textContent  = total;
  document.getElementById("stat-signed").textContent = signed;
  document.getElementById("stat-wpba").textContent   = wpba;
  document.getElementById("stat-remain").textContent = total - signed;
  const pct = total ? Math.round(signed / total * 100) : 0;
  document.getElementById("main-pct").textContent = pct + "%";
  document.getElementById("main-bar").style.width = pct + "%";
}

function updateDomainBar(did) {
  const d = DOMAINS.find(x => x.id === did);
  if (!d) return;
  const total  = d.caps.length;
  const signed = d.caps.filter(c => (capState[capId(did, c.c)] || {}).signed).length;
  const bar = document.getElementById("mb-" + did);
  const cnt = document.getElementById("dc-" + did);
  if (bar) bar.style.width = (total ? signed / total * 100 : 0) + "%";
  if (cnt) cnt.textContent = signed + "/" + total;
}

function applyFilter() {
  DOMAINS.forEach(d => {
    let anyVisible = false;
    d.caps.forEach(c => {
      const id = capId(d.id, c.c);
      const st = capState[id] || {};
      const el = document.getElementById("cap-" + id);
      if (!el) return;
      const show = currentFilter === "all"     ? true
                 : currentFilter === "pending"  ? !st.signed
                 : currentFilter === "signed"   ? !!st.signed
                 : currentFilter === "nowpba"   ? !!st.wpba && !st.signed
                 : true;
      el.style.display = show ? "" : "none";
      if (show) anyVisible = true;
    });
    const card = document.getElementById("dcard-" + d.id);
    if (card) card.style.display = anyVisible ? "" : "none";
  });
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".fbtn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilter();
}

function toggleSigned(did, code) {
  const id = capId(did, code);
  if (!capState[id]) capState[id] = {};
  capState[id].signed = !capState[id].signed;
  saveJSON(CAP_KEY, capState);

  const item  = document.getElementById("cap-" + id);
  const check = document.getElementById("chk-" + id);

  if (capState[id].signed) {
    item.classList.add("done"); check.classList.add("checked");
  } else {
    item.classList.remove("done"); check.classList.remove("checked");
  }
  updateDomainBar(did);
  updateCapStats();
  applyFilter();
}

// ── WPBA MODAL ────────────────────────────────────────────────────────

let _modalDid = null, _modalCode = null, _modalType = null;

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function fmtDate(iso) {
  if (!iso) return '';
  const [y, m, day] = iso.split('-');
  return `${day}/${m}/${y}`;
}

function openWpbaModal(did, code) {
  _modalDid  = did;
  _modalCode = code;
  _modalType = null;

  const id = capId(did, code);
  const st = capState[id] || {};
  const d  = DOMAINS.find(x => x.id === did);
  const c  = d ? d.caps.find(x => x.c === code) : null;

  document.getElementById('modal-cap-name').textContent = c ? c.d.slice(0, 60) + (c.d.length > 60 ? '…' : '') : 'Log WPBA';
  document.getElementById('modal-date').value = st.wpbaDate || todayStr();

  // Pre-select existing type if set
  document.querySelectorAll('.wpba-type-btn').forEach(b => {
    b.classList.toggle('selected', b.textContent === (st.wpbaType || ''));
  });
  if (st.wpbaType) { _modalType = st.wpbaType; }

  document.getElementById('modal-confirm-btn').disabled = !_modalType;
  document.getElementById('modal-clear-btn').style.display = st.wpba ? '' : 'none';
  document.getElementById('wpba-modal').classList.remove('hidden');
}

function selectType(type) {
  _modalType = type;
  document.querySelectorAll('.wpba-type-btn').forEach(b => b.classList.toggle('selected', b.textContent === type));
  document.getElementById('modal-confirm-btn').disabled = false;
}

function closeModal() {
  document.getElementById('wpba-modal').classList.add('hidden');
  _modalDid = _modalCode = _modalType = null;
}

function handleBackdropClick(e) {
  if (e.target === document.getElementById('wpba-modal')) closeModal();
}

function confirmWpba() {
  if (!_modalType || !_modalDid || !_modalCode) return;
  const id   = capId(_modalDid, _modalCode);
  const date = document.getElementById('modal-date').value || todayStr();
  if (!capState[id]) capState[id] = {};
  capState[id].wpba     = true;
  capState[id].wpbaType = _modalType;
  capState[id].wpbaDate = date;
  saveJSON(CAP_KEY, capState);
  refreshWpbaDisplay(id);
  updateCapStats();
  applyFilter();
  closeModal();
  showToast(_modalType + ' logged — ' + fmtDate(date));
}

function clearWpba() {
  if (!_modalDid || !_modalCode) return;
  const id = capId(_modalDid, _modalCode);
  if (!capState[id]) capState[id] = {};
  capState[id].wpba     = false;
  capState[id].wpbaType = null;
  capState[id].wpbaDate = null;
  saveJSON(CAP_KEY, capState);
  refreshWpbaDisplay(id);
  updateCapStats();
  applyFilter();
  closeModal();
  showToast('WPBA cleared');
}

function refreshWpbaDisplay(id) {
  const st  = capState[id] || {};
  const box = document.getElementById('wbox-' + id);
  const tog = document.getElementById('wpba-' + id);
  if (!box || !tog) return;
  box.classList.toggle('checked', !!st.wpba);
  // Rebuild the inner label/tag/date span content
  const lbl = document.getElementById('wlbl-' + id);
  if (lbl) lbl.textContent = st.wpba ? '' : 'WPBA submitted';
  // Remove old tag/date spans and re-add
  tog.querySelectorAll('.wpba-tag, .wpba-date').forEach(el => el.remove());
  if (st.wpba && st.wpbaType) {
    const tag = document.createElement('span');
    tag.className = 'wpba-tag';
    tag.textContent = st.wpbaType;
    tog.appendChild(tag);
  }
  if (st.wpba && st.wpbaDate) {
    const dt = document.createElement('span');
    dt.className = 'wpba-date';
    dt.textContent = fmtDate(st.wpbaDate);
    tog.appendChild(dt);
  }
}

function renderCaps() {
  const container = document.getElementById("domains-container");
  container.innerHTML = "";
  DOMAINS.forEach(d => {
    const total  = d.caps.length;
    const signed = d.caps.filter(c => (capState[capId(d.id, c.c)] || {}).signed).length;
    const pct    = total ? Math.round(signed / total * 100) : 0;

    const card = document.createElement("div");
    card.className = "domain-card";
    card.id = "dcard-" + d.id;

    const hdr = document.createElement("div");
    hdr.className = "domain-hdr";
    hdr.innerHTML = `
      <span class="domain-chevron" id="chev-${d.id}">&#9658;</span>
      <span class="domain-name">${d.name}</span>
      <div class="domain-meta">
        <span class="domain-count" id="dc-${d.id}">${signed}/${total}</span>
        <div class="domain-minibar"><div class="domain-minifill" id="mb-${d.id}" style="width:${pct}%"></div></div>
      </div>`;
    hdr.onclick = () => {
      const body = document.getElementById("dbody-" + d.id);
      const chev = document.getElementById("chev-" + d.id);
      const open = body.classList.toggle("open");
      chev.classList.toggle("open", open);
    };

    const body = document.createElement("div");
    body.className = "domain-body";
    body.id = "dbody-" + d.id;
    const ul = document.createElement("ul");
    ul.className = "cap-list";

    d.caps.forEach(c => {
      const id = capId(d.id, c.c);
      const st = capState[id] || {};
      const li = document.createElement("li");
      li.className = "cap-item" + (st.signed ? " done" : "");
      li.id = "cap-" + id;
      li.innerHTML = `
        <div class="cap-left">
          <span class="cap-code">${c.c}</span>
          <div class="cap-check${st.signed ? " checked" : ""}" id="chk-${id}" onclick="toggleSigned('${d.id}','${c.c}')"></div>
        </div>
        <div class="cap-body">
          <div class="cap-desc">${c.d}</div>
          <div class="cap-footer">
            ${supBadge(c.s)}
            <div class="wpba-toggle available" id="wpba-${id}" onclick="openWpbaModal('${d.id}','${c.c}')">
              <div class="wpba-box${st.wpba ? " checked" : ""}" id="wbox-${id}"></div>
              <span class="wpba-lbl" id="wlbl-${id}">${st.wpba ? '' : 'WPBA submitted'}</span>
              ${st.wpba && st.wpbaType ? `<span class="wpba-tag">${st.wpbaType}</span>` : ''}
              ${st.wpba && st.wpbaDate ? `<span class="wpba-date">${st.wpbaDate}</span>` : ''}
            </div>
          </div>
        </div>`;
      ul.appendChild(li);
    });

    body.appendChild(ul);
    card.appendChild(hdr);
    card.appendChild(body);
    container.appendChild(card);
  });
}

// ── PROCEDURES ────────────────────────────────────────────────────────

function updateProcStats() {
  let total = 0, done = 0;
  PROCEDURES.forEach(g => g.procs.forEach(p => {
    total++;
    if ((procState[p.id] || {}).done) done++;
  }));
  document.getElementById("stat-total").textContent  = total;
  document.getElementById("stat-signed").textContent = done;
  document.getElementById("stat-wpba").textContent   = "–";
  document.getElementById("stat-remain").textContent = total - done;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("main-pct").textContent = pct + "%";
  document.getElementById("main-bar").style.width = pct + "%";
}

function updateProcGroupBar(gid) {
  const g = PROCEDURES.find(x => x.id === gid);
  if (!g) return;
  const total = g.procs.length;
  const done  = g.procs.filter(p => (procState[p.id] || {}).done).length;
  const bar = document.getElementById("pmb-" + gid);
  const cnt = document.getElementById("pdc-" + gid);
  if (bar) bar.style.width = (total ? done / total * 100 : 0) + "%";
  if (cnt) cnt.textContent = done + "/" + total;
}

function toggleProc(gid, pid) {
  if (!procState[pid]) procState[pid] = {};
  procState[pid].done = !procState[pid].done;
  saveJSON(PROC_KEY, procState);
  const item = document.getElementById("pitem-" + pid);
  const chk  = document.getElementById("pchk-"  + pid);
  if (procState[pid].done) { item.classList.add("done"); chk.classList.add("checked"); }
  else                     { item.classList.remove("done"); chk.classList.remove("checked"); }
  updateProcGroupBar(gid);
  if (currentTab === "procs") updateProcStats();
}

function renderProcs() {
  const container = document.getElementById("procs-container");
  container.innerHTML = "";
  PROCEDURES.forEach(g => {
    const total = g.procs.length;
    const done  = g.procs.filter(p => (procState[p.id] || {}).done).length;
    const pct   = total ? Math.round(done / total * 100) : 0;

    const card = document.createElement("div");
    card.className = "domain-card";

    const hdr = document.createElement("div");
    hdr.className = "domain-hdr";
    hdr.innerHTML = `
      <span class="domain-chevron" id="pchev-${g.id}">&#9658;</span>
      <span class="domain-name">${g.name}</span>
      <div class="domain-meta">
        <span class="domain-count" id="pdc-${g.id}">${done}/${total}</span>
        <div class="domain-minibar"><div class="domain-minifill" id="pmb-${g.id}" style="width:${pct}%"></div></div>
      </div>`;
    hdr.onclick = () => {
      const body = document.getElementById("pbody-" + g.id);
      const chev = document.getElementById("pchev-" + g.id);
      const open = body.classList.toggle("open");
      chev.classList.toggle("open", open);
    };

    const body = document.createElement("div");
    body.className = "domain-body";
    body.id = "pbody-" + g.id;
    const ul = document.createElement("ul");
    ul.className = "cap-list";

    g.procs.forEach(p => {
      const ps = procState[p.id] || {};
      const li = document.createElement("li");
      li.className = "proc-item" + (ps.done ? " done" : "");
      li.id = "pitem-" + p.id;
      li.innerHTML = `
        <div class="proc-check${ps.done ? " checked" : ""}" id="pchk-${p.id}" onclick="toggleProc('${g.id}','${p.id}')"></div>
        <div class="proc-body">
          <div class="proc-name">${p.name}</div>
          <div class="cap-footer">${supBadge(p.s)}</div>
        </div>`;
      ul.appendChild(li);
    });

    body.appendChild(ul);
    card.appendChild(hdr);
    card.appendChild(body);
    container.appendChild(card);
  });
}

// ── EXPORT / IMPORT / RESET ───────────────────────────────────────────

function exportData() {
  const payload = { version: 4, exported: new Date().toISOString(), capState, procState };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url;
  a.download = "stage3_tracker_" + new Date().toISOString().slice(0, 10) + ".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("Progress exported");
}

function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.capState || data.state) {
        capState  = data.capState || data.state;
        procState = data.procState || {};
        saveJSON(CAP_KEY,  capState);
        saveJSON(PROC_KEY, procState);
        renderCaps();
        renderProcs();
        applyFilter();
        if (currentTab === "procs") updateProcStats(); else updateCapStats();
        showToast("Progress imported");
      } else {
        showToast("Invalid file format");
      }
    } catch(err) { showToast("Could not read file"); }
  };
  reader.readAsText(file);
  evt.target.value = "";
}

function confirmReset() {
  if (confirm("Reset all progress? This cannot be undone.")) {
    capState = {}; procState = {};
    saveJSON(CAP_KEY, capState); saveJSON(PROC_KEY, procState);
    renderCaps(); renderProcs(); applyFilter();
    if (currentTab === "procs") updateProcStats(); else updateCapStats();
    showToast("All progress reset");
  }
}

// ── INIT ──────────────────────────────────────────────────────────────

renderCaps();
renderProcs();
applyFilter();
updateCapStats();
</script>
